<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache">
<title>TSG Project Planner</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>
/* ROOT LOCK TO PREVENT HORIZONTAL SCROLL IN LINE BROWSER */
* {box-sizing:border-box;margin:0;padding:0;font-family:Sarabun,sans-serif}
html, body {
  width: 100%; 
  max-width: 100%; 
  overflow-x: hidden; 
  position: relative; 
  background:#fff;
  color:#222;
  overscroll-behavior-x: none;
}

#bar {position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:8px;padding:0 12px;min-height:44px;background:#1560a8;border-bottom:2px solid #0f4a8a;flex-wrap:wrap; width: 100%;}
#bar h1 {font-size:13px;font-weight:700;color:#fff;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#bar .r {display:flex;align-items:center;gap:6px}
#uinfo {font-size:11px;color:rgba(255,255,255,.85)}

.tnav {display:flex;gap:4px;flex-wrap:wrap}
.tnb {padding:3px 9px;border-radius:4px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;font-size:11px;cursor:pointer;font-family:Sarabun,sans-serif;white-space:nowrap}
.tnb:hover {background:rgba(255,255,255,.3)}
.tnb.on {background:rgba(255,255,255,.9);color:#1560a8;font-weight:700}

.btn {padding:5px 13px;border-radius:4px;border:1px solid #aaa;background:#fff;color:#222;font-size:12px;font-family:Sarabun,sans-serif;cursor:pointer}
.btn:hover {background:#f0f0f0}
.btnp {background:#1560a8;border-color:#1560a8;color:#fff}
.btnp:hover {background:#0f4a8a}
.btnd {border-color:#c00;color:#c00}
.btnsm {padding:3px 9px;font-size:11px}

.pg {display:none; width: 100%; max-width: 100%;}
.pg.on {display:block}
#hpg.on {display:flex;height:calc(100vh - 44px);overflow:hidden; width: 100%;}

/* HOME */
.hsb {width:190px;min-width:190px;background:#f4f6f8;border-right:1px solid #ddd;display:flex;flex-direction:column;padding:14px 12px;gap:10px;overflow-y:auto}
.hslb {font-size:10px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.pb {width:100%;padding:10px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;font-family:Sarabun,sans-serif}
.pb:hover {border-color:#1560a8;background:#eef4ff}
.pbic {width:30px;height:30px;border-radius:4px;flex-shrink:0}
.pbm {background:#e8f0fb;border:1.5px solid #1560a8}
.pbi {background:#fef3e2;border:1.5px solid #d97706}
.pbt {font-size:12px;font-weight:700;color:#222;margin-bottom:1px}
.pbs {font-size:9px;color:#888}

.hpg-r {flex:1;display:flex;flex-direction:column;padding:14px;gap:12px;background:#f9f9f9;overflow-y:auto;align-items:center; max-width: 100%;}
.hcb {width:65%;min-width:300px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:10px; max-width: 100%;}
.hcb canvas {display:block;width:100%}

.prbox {margin-top:4px;border-top:1px solid #ddd;padding-top:10px;display:flex;flex-direction:column;gap:3px}
.prlb {font-size:10px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.prrow {display:flex;justify-content:space-between}
.prn {font-size:11px;color:#555}
.prm {font-size:11px;font-weight:700;color:#1560a8}
.pri {font-size:11px;font-weight:700;color:#d97706}
.prbg {height:5px;background:#e0e0e0;border-radius:3px;margin-top:2px}
.prfm {height:5px;background:#1560a8;border-radius:3px;transition:width .4s}
.prfi {height:5px;background:#d97706;border-radius:3px;transition:width .4s}

/* PLAN PAGE */
.ptb {position:sticky;top:44px;z-index:100;display:flex;align-items:center;gap:7px;padding:6px 13px;background:#f0f2f5;border-bottom:1px solid #ddd;flex-wrap:wrap; width: 100%;}
.ptit {font-size:14px;font-weight:700;color:#1560a8}
.sp {flex:1}
.rwc {display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
.rwc input {width:50px;padding:3px 5px;border:1px solid #ccc;border-radius:3px;font-size:12px;text-align:center;font-family:Sarabun,sans-serif}

/* S-CURVE */
.scs {display:flex;justify-content:center;padding:13px 0 9px;background:#fff;border-bottom:1px solid #ddd; width: 100%;}
.scb {width:50%;min-width:360px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:8px; max-width: 100%;}
.scb canvas {display:block;width:100%}

/* GANTT */
.gs {background:#fff;border-bottom:1px solid #ddd;overflow-x:hidden; width: 100%; max-width: 100%;}
.gs canvas {display:block; max-width: 100%;}

/* TABLE */
.ts {background:#fff; width: 100%; max-width: 100%;}
.tw {overflow-x:auto; width: 100%; max-width: 100%;}

table {
  border-collapse: collapse;
  font-size: 13px;
  width: 100%;
  min-width: 1000px;
  table-layout: fixed;
}

thead th {
  padding: 8px 10px;
  background: #e8edf2;
  border: 1px solid #bbb;
  font-size: 12px;
  font-weight: 700;
  color: #333;
  position: sticky;
  top: 0;
  z-index: 5;
  text-align: left;
}

.col-no    { width: 45px;  text-align: center; }
.col-item  { width: 100px; }
.col-desc  { width: auto;  } 
.col-date  { width: 135px; } 
.col-pct   { width: 60px;  text-align: center; }

tbody tr:nth-child(even) {background:#f7f9fb}
tbody tr:hover {background:#eef4ff}

td {
  border: 1px solid #ddd;
  padding: 2px 4px;
  height: 34px;
  vertical-align: middle;
}

.ci {
  width: 100%;
  height: 28px;
  border: none;
  background: transparent;
  font-size: 13px;
  font-family: Sarabun, sans-serif;
  color: #222;
  padding: 2px 6px;
  border-radius: 2px;
}

.ci:focus {outline:2px solid #1560a8;outline-offset:-1px;background:#fff}
.ci[readonly] {color:#888;cursor:default}
.ci.r {text-align:right}

body.ed .ci:not([readonly]) {
  background:#fffef0;
  cursor:text;
  pointer-events:all;
  border: 1px solid #e0e0e0;
}
body:not(.ed) .ci {pointer-events:none}

.wtb {padding:5px 13px;background:#f4f6f8;border-top:1px solid #ddd;font-size:12px;color:#555;display:flex;gap:18px; width: 100%;}
.ok {color:#2a8a2a;font-weight:700}
.wn {color:#c00;font-weight:700}

/* PRINT MODE FOR 100% WIDTH A4 CONTINUOUS PDF EXPORT */
.print-mode {
  width: 1000px !important;
  max-width: 1000px !important;
  min-width: 1000px !important;
  margin: 0 !important;
  padding: 20px !important; 
  background: #fff !important;
  height: auto !important;
  overflow: visible !important;
  position: absolute !important; 
  top: 0 !important;
  left: 0 !important;
  z-index: 9999 !important;
}
.print-mode .scs { padding: 0 0 20px 0 !important; border-bottom: none !important; display: block; }
.print-mode .scb { width: 100% !important; min-width: 100% !important; border: none !important; padding: 0 !important; box-shadow: none !important; }
.print-mode .gs { overflow: visible !important; width: 100% !important; min-width: 100% !important; border-bottom: none !important; margin-bottom: 20px !important; }
.print-mode .ts { overflow: visible !important; width: 100% !important; min-width: 100% !important; }
.print-mode .tw { overflow: visible !important; width: 100% !important; min-width: 100% !important; }
.print-mode table { width: 100% !important; min-width: 100% !important; table-layout: fixed !important; border-collapse: collapse !important; }
.print-mode .col-no    { width: 4% !important; text-align: center; }
.print-mode .col-item  { width: 8% !important; }
.print-mode .col-desc  { width: 34% !important; }
.print-mode .col-date  { width: 11% !important; text-align: center; }
.print-mode .col-pct   { width: 5% !important; text-align: center; }
.print-mode th { font-size: 11px !important; padding: 6px 4px !important; white-space: normal; background: #e8edf2 !important; }
.print-mode td { padding: 4px !important; border: 1px solid #ddd !important; }
.print-mode .ci { font-size: 11px !important; padding: 0 !important; background: transparent !important; border: none !important; color: #000 !important; width: 100% !important; height: auto !important; min-width: 0 !important; }
.print-mode .wtb { display: none !important; } 

/* MODAL */
.mo {display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.mo.on {display:flex}
.md {background:#fff;border-radius:8px;padding:22px 26px;min-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.md h2 {font-size:14px;margin-bottom:7px}
.md p {font-size:12px;color:#666;margin-bottom:14px;line-height:1.6}
.md label {font-size:11px;color:#666;display:block;margin-bottom:3px}
.md input {width:100%;padding:6px 9px;border:1px solid #ccc;border-radius:4px;font-size:12px;margin-bottom:10px;font-family:Sarabun,sans-serif}
.ma {display:flex;gap:7px;justify-content:flex-end;margin-top:7px}

#toast {position:fixed;bottom:18px;right:18px;background:#fff;border:1px solid #ccc;border-radius:5px;padding:7px 14px;font-size:12px;color:#222;box-shadow:0 2px 10px rgba(0,0,0,.12);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
#toast.on {opacity:1}

/* MOBILE BROWSER OPTIMIZATIONS (Max Width 768px) */
@media(max-width:768px){
  #hpg.on {flex-direction:column!important;height:auto!important;overflow-y:auto; width: 100%;}
  .hsb {width:100%!important;border-right:none;border-bottom:1px solid #ddd}
  .pb {width:100%!important}
  .hpg-r {padding:10px; width: 100%; max-width: 100%; overflow-x: hidden;}
  .hcb {width:100%; max-width: 100%; min-width:unset; padding: 5px;}
  
  .scs {padding: 10px 5px; width: 100%; max-width: 100%;}
  .scb {width:100%; max-width: 100%; min-width:unset; padding: 5px;}
  #bar h1 {font-size:10px}
  
  /* STRICT 100% WIDTH FOR MOBILE CONTAINERS */
  .ts { width: 100%; max-width: 100%; overflow-x: hidden; }
  .tw { width: 100%; max-width: 100%; overflow-x: hidden; }
  table { min-width: 100% !important; width: 100% !important; max-width: 100% !important; table-layout: fixed; }
  
  /* Compress columns */
  .col-no { width: 6% !important; }
  .col-item { width: 12% !important; }
  .col-desc { width: 28% !important; }
  .col-date { width: 14% !important; }
  .col-pct { width: 6% !important; }
  
  th { font-size: 8px !important; padding: 4px 1px !important; word-wrap: break-word; letter-spacing: -0.2px; }
  td { padding: 1px !important; height: 26px !important; }
  .ci { font-size: 9px !important; padding: 0 !important; height: 24px !important; letter-spacing: -0.2px;}
  
  /* Hide the native date picker icons to save horizontal space */
  input[type="date"]::-webkit-inner-spin-button,
  input[type="date"]::-webkit-calendar-picker-indicator { display: none; -webkit-appearance: none; margin: 0; }
  
  .wtb { font-size: 10px; flex-wrap: wrap; }
  .rwc input { width: 35px; font-size: 10px; padding: 2px; }
  .btnsm { padding: 2px 5px; font-size: 10px; }
}

@media(max-width:480px){
  #bar h1 {display:none}
  #uinfo {display:none}
}
</style>
</head>
<body>

<div id="bar">
  <h1>TSG PROJECT PLANNER — Technical Expertise & Reliable Sourcing</h1>
  <div class="tnav">
    <button class="tnb" id="nbM" onclick="goPlan('material')">📦 Material</button>
    <button class="tnb" id="nbI" onclick="goPlan('installation')">🔧 Installation</button>
  </div>
  <div class="r">
    <span id="uinfo"></span>
    <div id="gBtn"></div>
    <button class="btn btnsm" id="soBtn" style="display:none;color:#fff;background:transparent;border-color:rgba(255,255,255,.5)" onclick="signOut()">Sign Out</button>
  </div>
</div>

<div class="pg" id="hpg">
  <div class="hsb">
    <div class="hslb">Select Plan</div>
    <button class="pb" onclick="goPlan('material')">
      <div class="pbic pbm"></div>
      <div><div class="pbt">Material Plan</div><div class="pbs">Procurement &amp; delivery</div></div>
    </button>
    <button class="pb" onclick="goPlan('installation')">
      <div class="pbic pbi"></div>
      <div><div class="pbt">Installation Plan</div><div class="pbs">Installation &amp; commissioning</div></div>
    </button>
    <div class="prbox">
      <div class="prlb">Actual Progress</div>
      <div class="prrow"><span class="prn">Material</span><span class="prm" id="hmp">0%</span></div>
      <div class="prbg"><div class="prfm" id="hmb" style="width:0%"></div></div>
      <div class="prrow" style="margin-top:7px"><span class="prn">Installation</span><span class="pri" id="hip">0%</span></div>
      <div class="prbg"><div class="prfi" id="hib" style="width:0%"></div></div>
    </div>
  </div>
  <div class="hpg-r">
    <div class="hcb"><canvas id="cMat" height="200"></canvas></div>
    <div class="hcb"><canvas id="cInst" height="200"></canvas></div>
  </div>
</div>

<div class="pg" id="ppg">
  <div class="ptb" id="planToolbar">
    <button class="btn btnsm" onclick="goHome()">← Home</button>
    <span class="ptit" id="ptit"></span>
    
    <button class="btn btnsm" style="margin-left:8px; border-color:#d97706; color:#d97706;" onclick="exportPDF()">📄 PDF</button>
    <button class="btn btnsm" style="border-color:#2a8a2a; color:#2a8a2a;" onclick="exportExcel()">📊 Excel</button>
    
    <div class="sp"></div>
    <div class="rwc" id="rwc" style="display:none">
      Rows:<input type="number" id="rwn" min="1" max="300" value="16">
      <button class="btn btnsm" onclick="applyRows()">Apply</button>
    </div>
    <button class="btn btnsm btnd" id="rstBtn" style="display:none" onclick="resetRows()">✕ Reset</button>
    <button class="btn btnsm btnp" id="savBtn" style="display:none" onclick="saveData()">💾 Save</button>
  </div>
  
  <div class="scs"><div class="scb"><canvas id="cSC" height="260"></canvas></div></div>
  <div class="gs" id="gsec"><canvas id="cGantt"></canvas></div>
  
  <div class="ts">
    <div class="tw">
      <table>
        <thead><tr>
          <th class="col-no">No.</th>
          <th class="col-item">Item No.</th>
          <th class="col-desc">Description</th>
          <th class="col-date">Plan Start</th>
          <th class="col-date">Plan Finish</th>
          <th class="col-pct">Wt%</th>
          <th class="col-date">Act Start</th>
          <th class="col-date">Act Finish</th>
          <th class="col-pct">Act%</th>
        </tr></thead>
        <tbody id="tb"></tbody>
      </table>
    </div>
    <div class="wtb">Weight: <span id="wts" class="wn">0%</span> &nbsp;|&nbsp; With actual: <span id="acn">0</span></div>
  </div>
</div>

<div class="mo" id="patMo">
  <div class="md">
    <h2>GitHub Access Token</h2>
    <p>Enter your PAT. Stored in session only.</p>
    <label>Token</label>
    <input type="password" id="patIn" placeholder="ghp_...">
    <div class="ma">
      <button class="btn" onclick="document.getElementById('patMo').classList.remove('on')">Cancel</button>
      <button class="btn btnp" onclick="confirmPAT()">Save &amp; Continue</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const GCI='695932302309-p1rccufdkq9itb5paam78j1ll1ejb1uu.apps.googleusercontent.com';
const EE='suthepp.top@gmail.com';
const API='https://api.github.com/repos/suthepptop/tsg-planner/contents/data.json';
let isEd=false,plan=null,sha=null;
let D={material:{rows:[], snap:{}},installation:{rows:[], snap:{}}};
const $=id=>document.getElementById(id);
const FN='Sarabun,sans-serif';

// ── HELPERS ──
const pd=s=>{
  if(!s)return null;s=s.trim();
  const m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
  if(m){const d=new Date(+m[3],+m[2]-1,+m[1]);return isNaN(d.getTime())?null:d;}
  return null;
};
const toI=s=>{if(!s)return'';const m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);return m?`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`:'';};
const frI=s=>{if(!s)return'';const[y,mo,d]=s.split('-');return`${d}/${mo}/${y}`;};
const nd=s=>{
  if(!s)return'';s=s.trim();
  if(/^\d{1,2}[\/-]\d{1,2}[\/-]\d{4}$/.test(s)){const sp=s.includes('/')?'/':'-';const[d,m,y]=s.split(sp);return`${d.padStart(2,'0')}/${m.padStart(2,'0')}/${y}`;}
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;}
  if(/^\d{5}$/.test(s)){const dt=new Date((+s-25569)*86400000);return`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;}
  return s;
};
const nn=v=>{v=String(v).trim().replace('%','');let n=parseFloat(v)||0;if(n>0&&n<1)n*=100;return Math.round(n*100)/100;};
const dd=(a,b)=>Math.round((b-a)/86400000);
const fd=s=>{const d=pd(s);return d?`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`:'';}; 
const toast=(msg,err=false)=>{const e=$('toast');e.textContent=msg;e.style.borderColor=err?'#c00':'#ccc';e.classList.add('on');setTimeout(()=>e.classList.remove('on'),2800);};

function getRange(rows){
  let mn=null,mx=null;
  rows.forEach(r=>{const s=pd(r.ps),e=pd(r.pe);if(s&&(!mn||s<mn))mn=s;if(e&&(!mx||e>mx))mx=e;});
  if(!mn)mn=new Date('2026-02-16');if(!mx)mx=new Date('2026-07-15');
  return{start:mn,end:mx,days:dd(mn,mx)+1};
}

// ── SNAPSHOT ENGINE ──
function recordSnap() {
  if(!plan) return;
  if(!D[plan].snap) D[plan].snap = {};
  const d = new Date();
  const tStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  D[plan].snap[tStr] = calcP(D[plan].rows);
}

// ── EXPORT FUNCTIONS ──
function exportExcel() {
  if(!plan) return;
  const rows = D[plan].rows;
  let csv = "\ufeffNo.,Item No.,Description,Plan Start,Plan Finish,Wt%,Act Start,Act Finish,Act%\n";
  
  rows.forEach(r => {
    const desc = (r.desc || '').replace(/"/g, '""');
    csv += `${r.no || ''},"${r.itemNo || ''}","${desc}",${r.ps || ''},${r.pe || ''},${r.wt || 0},${r.as || ''},${r.ae || ''},${r.pct || 0}\n`;
  });
  
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `TSG_${plan}_plan.csv`;
  link.click();
  toast('✓ Excel (CSV) Exported');
}

function exportPDF() {
  if(!plan) return;
  toast('Generating continuous 100% A4-width PDF...');
  
  const element = document.getElementById('ppg');
  const toolbar = document.getElementById('planToolbar');
  
  toolbar.style.display = 'none';
  element.classList.add('print-mode');
  
  renderGantt();
  renderSC();
  
  setTimeout(() => {
    const w = element.offsetWidth; 
    const h = element.offsetHeight;
    
    const mmWidth = 210;
    const mmHeight = (h / w) * mmWidth;
    
    const opt = {
      margin:       0, 
      filename:     `TSG_${plan}_plan.pdf`,
      image:        { type: 'jpeg', quality: 1.0 },
      html2canvas:  { scale: 2, useCORS: true, windowWidth: w, width: w, height: h, scrollY: 0 },
      jsPDF:        { unit: 'mm', format: [mmWidth, mmHeight], orientation: 'portrait' } 
    };
    
    html2pdf().set(opt).from(element).save().then(() => {
      toolbar.style.display = 'flex'; 
      element.classList.remove('print-mode');
      renderGantt();
      renderSC();
      toast('✓ PDF Exported Successfully');
    }).catch((err) => {
      toolbar.style.display = 'flex'; 
      element.classList.remove('print-mode');
      renderGantt();
      renderSC();
      toast('✗ PDF generation failed', true);
    });
  }, 500);
}

// ── SESSION RESTORE ──
function restoreSession() {
  const storedEd = sessionStorage.getItem('isEd');
  const storedEmail = sessionStorage.getItem('email');
  if (storedEd === 'true') {
    isEd = true;
    $('uinfo').textContent = storedEmail;
    $('gBtn').style.display = 'none';
    $('soBtn').style.display = 'inline-block';
    document.body.classList.add('ed');
    showEdUI();
    setupPaste();
  }
}

// ── AUTH ──
window.onload=()=>{
  restoreSession(); 
  
  const lp = sessionStorage.getItem('lastPlan');
  if(lp) {
    plan = lp;
    showPg('ppg');
    $('ptit').textContent=lp==='material'?'📦 Material Plan':'🔧 Installation Plan';
    $(lp==='material'?'nbM':'nbI').classList.add('on');
  } else {
    showPg('hpg');
  }

  google.accounts.id.initialize({client_id:GCI,callback:onLogin,auto_select:true});
  google.accounts.id.renderButton($('gBtn'),{theme:'filled_blue',size:'small',text:'signin_with',shape:'rectangular'});
  loadData();
};

function onLogin(resp){
  const p=JSON.parse(atob(resp.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));

// ── DATA ──
async function loadData() {
  let pat = sessionStorage.getItem('ghPAT');
  let headers = {};
  if (pat) headers['Authorization'] = `token ${pat}`;

  try {
    const r = await fetch(API + '?t=' + Date.now(), { headers });
    if (!r.ok) { initD(); renderAll(); return; }
    const j = await r.json(); 
    sha = j.sha; 
    const raw = atob(j.content.replace(/\n/g, ''));
    const bytes = Uint8Array.from(raw, c => c.charCodeAt(0));
    const txt = new TextDecoder('utf-8').decode(bytes);
    const d = JSON.parse(txt);
    
    // Safely parse old DB structures and add .snap object if missing
    if (d.material) { 
        D.material.rows = d.material.rows || []; 
        D.material.snap = d.material.snap || {}; 
    }
    if (d.installation) { 
        D.installation.rows = d.installation.rows || []; 
        D.installation.snap = d.installation.snap || {}; 
    }
    toast('✓ Data loaded');
  } catch(e) { 
    initD(); 
  }
  renderAll();
}

function initD(){
  const mk=n=>Array.from({length:n},(_,i)=>({no:i+1,itemNo:'',desc:'',ps:'',pe:'',wt:0,as:'',ae:'',pct:0}));
  if(!D.material) D.material = {rows:[], snap:{}};
  if(!D.material.rows || !D.material.rows.length) D.material.rows=mk(16);
  if(!D.material.snap) D.material.snap={};
  
  if(!D.installation) D.installation = {rows:[], snap:{}};
  if(!D.installation.rows || !D.installation.rows.length) D.installation.rows=mk(16);
  if(!D.installation.snap) D.installation.snap={};
}

async function saveData() {
  let pat = sessionStorage.getItem('ghPAT');
  if (!pat) { $('patMo').classList.add('on'); return; }

  if (!sha) {
    try {
      const check = await fetch(API, { headers: { Authorization: `token ${pat}` } });
      if (check.ok) {
        const j = await check.json();
        sha = j.sha;
      }
    } catch(e) { console.warn("Could not pre-fetch SHA"); }
  }

  const json = JSON.stringify(D, null, 2);
  const bytes = new TextEncoder().encode(json);
  let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
  const content = btoa(bin);
  
  const body = { message: `Update ${plan} data`, content };
  if (sha) body.sha = sha;

  try {
    const r = await fetch(API, {
      method: 'PUT',
      headers: { Authorization: `token ${pat}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    
    if (!r.ok) { 
      const e = await r.json(); 
      toast('✗ ' + e.message, true); 
      return; 
    }
    
    const j = await r.json(); 
    sha = j.content.sha; 
    toast('✓ Saved');
  } catch(e) { 
    toast('✗ Error', true); 
  }
}

function confirmPAT(){const v=$('patIn').value.trim();if(!v)return;sessionStorage.setItem('ghPAT',v);$('patMo').classList.remove('on');saveData();}

function updWt(){
  if(!plan)return;

// ── PASTE ──
function setupPaste(){
  if(window._pf)document.removeEventListener('paste',window._pf);
  window._pf=e=>{
    if(!isEd||!plan)return;
    const tb=$('tb');if(!tb)return;
    const inputs=Array.from(tb.querySelectorAll('input'));
    const si=inputs.indexOf(document.activeElement);if(si<0)return;
    e.preventDefault();
    const txt=(e.clipboardData||window.clipboardData).getData('text');if(!txt)return;
    const pr=txt.trim().split(/\r?\n/).map(r=>r.split('\t'));
    const cols=['no','itemNo','desc','ps','pe','wt','as','ae','pct'];
    const sr=Math.floor(si/9),sc=si%9;
    const rows=D[plan].rows;
    while(rows.length<sr+pr.length)rows.push({no:rows.length+1,itemNo:'',desc:'',ps:'',pe:'',wt:0,as:'',ae:'',pct:0});
    pr.forEach((row,ri)=>{
      const ri2=sr+ri;
      row.forEach((val,ci)=>{
        const ci2=sc+ci;if(ci2>=cols.length)return;
        const k=cols[ci2];let v=val.trim();
        if('ps pe as ae'.split(' ').includes(k))v=nd(v);
        else if('wt pct no'.split(' ').includes(k))v=nn(v);
        rows[ri2][k]=v;
        if(k==='ps'&&!rows[ri2].as)rows[ri2].as=v;
        if(k==='pe'&&!rows[ri2].ae)rows[ri2].ae=v;
      });
    });
    $('rwn').value=rows.length;
    renderTable(); recordSnap(); renderGantt(); renderSC();
    toast('✓ Pasted '+pr.length+' rows');
  };
  document.addEventListener('paste',window._pf);
}

// ── GANTT (DYNAMIC MULTI-LINE TEXT WRAPPING + MOBILE RESPONSIVE) ──
function renderGantt(){
  const cv=$('cGantt'),sec=$('gsec');
  if(!cv||!plan)return;
  const rows=D[plan].rows;
  const{start:ps,end:pe,days:td}=getRange(rows);
  const today=new Date();
  
  const isMob = window.innerWidth <= 768;
  const secW = sec.getBoundingClientRect().width || sec.offsetWidth || window.innerWidth;
  const W = isMob ? secW : Math.max(secW, 600);
  const LW = Math.floor(W * (isMob ? 0.30 : 0.35)); 
  
  const HH = isMob ? 28 : 34;
  const LH = isMob ? 20 : 26;
  const baseRH = isMob ? 30 : 38;
  
  const tmpCtx = cv.getContext('2d');
  const maxW = LW - 10;
  
  const getLines = (ctx, text, maxWidth) => {
      if(!text) return [''];
      const lines = []; let curr = '';
      for(let i=0; i<text.length; i++) {
          const c = text[i];
          if (ctx.measureText(curr + c).width <= maxWidth) { 
              curr += c; 
          } else {
              const ls = curr.lastIndexOf(' ');
              if(ls > 0 && curr.length - ls < 15) {
                   lines.push(curr.substring(0, ls));
                   curr = curr.substring(ls + 1) + c;
              } else { 
                   lines.push(curr); 
                   curr = c; 
              }
          }
      }
      if(curr) lines.push(curr);
      return lines;
  };

  const rowData = rows.map((r, i) => {
      const lbl = (r.itemNo ? r.itemNo + ' ' : '') + (r.desc || '');
      const isDesc = !!r.desc;
      tmpCtx.font = (isDesc ? (isMob?'10px ':'13px ') : (isMob?'italic 9px ':'italic 12px ')) + FN;
      const lines = getLines(tmpCtx, lbl || ('row '+r.no), maxW);
      const rh = Math.max(baseRH, lines.length * (isMob?14:18) + 12);
      return { r, lines, rh, isDesc };
  });

  const totalRH = rowData.reduce((sum, rd) => sum + rd.rh, 0);
  const H = HH + totalRH + LH;
  
  cv.width=W;cv.height=H;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');
  const BW=W-LW;
  const gx=d=>LW+(d/td)*BW;
  const dx=d=>gx(dd(ps,d));
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

  // Month headers
  const ms=[];let mc=new Date(ps.getFullYear(),ps.getMonth(),1);
  while(mc<=pe){ms.push(new Date(mc));mc=new Date(mc.getFullYear(),mc.getMonth()+1,1);}
  ms.forEach((m,i)=>{
    const x1=Math.max(LW,dx(m)),x2=Math.min(W,dx(new Date(m.getFullYear(),m.getMonth()+1,1)));
    ctx.fillStyle=i%2?'#1050a0':'#1560a8';ctx.fillRect(x1,0,x2-x1,HH);
    ctx.fillStyle='#fff';ctx.font='bold '+(isMob?'10px ':'13px ')+FN;ctx.textAlign='center';
    ctx.fillText(m.toLocaleString('default',{month:'short'})+"'"+String(m.getFullYear()).slice(2),(x1+x2)/2,HH - (isMob?8:10));
    if(x1>LW){ctx.strokeStyle='#e0e0e0';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(x1,HH);ctx.lineTo(x1,H-LH);ctx.stroke();}
  });
  ctx.fillStyle='#1560a8';ctx.fillRect(0,0,LW,HH);
  ctx.fillStyle='#fff';ctx.font='bold '+(isMob?'10px ':'13px ')+FN;ctx.textAlign='center';ctx.fillText('Item / Description',LW/2,HH - (isMob?8:10));
  ctx.strokeStyle='#999';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(LW,0);ctx.lineTo(LW,H);ctx.stroke();

  // Draw dynamically wrapped rows
  let y = HH;
  rowData.forEach((rd, i) => {
    const r = rd.r;
    const RH = rd.rh;
    ctx.fillStyle=i%2?'#fff':'#f7f9fb';ctx.fillRect(0,y,W,RH);
    ctx.strokeStyle='#e5e5e5';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(0,y+RH);ctx.lineTo(W,y+RH);ctx.stroke();
    
    // Draw Text lines
    ctx.fillStyle=rd.isDesc?'#111':'#aaa';
    ctx.font=(rd.isDesc ? (isMob?'10px ':'13px ') : (isMob?'italic 9px ':'italic 12px ')) + FN;
    ctx.textAlign='left';
    rd.lines.forEach((line, li) => {
        const lh = isMob ? 14 : 18;
        const textStartY = y + (RH - (rd.lines.length * lh)) / 2 + (isMob?10:13);
        ctx.fillText(line, 5, textStartY + li * lh);
    });
    
    // Draw Bars
    const s=pd(r.ps),e=pd(r.pe);
    if(s && e){
        const bx=dx(s),ex=dx(e),bw=Math.max(ex-bx,3);
        const pH=isMob?10:14, pY=y+(RH - (isMob?20:26))/2; 
        ctx.fillStyle='#1560a8';
        ctx.beginPath();if(ctx.roundRect)ctx.roundRect(bx,pY,bw,pH,3);else ctx.rect(bx,pY,bw,pH);ctx.fill();
        if(bw>26){ctx.fillStyle='#fff';ctx.font='bold '+(isMob?'8px ':'10px ')+FN;ctx.textAlign='center';ctx.fillText(dd(s,e)+1+'d',bx+bw/2,pY+(isMob?8:10));}
        const mY=pY+(isMob?8:11);
        ctx.fillStyle='#666';ctx.font=(isMob?'8px ':'10px ')+FN;
        ctx.textAlign='right';ctx.fillText(fd(r.ps),bx-3,mY);
        ctx.textAlign='left';ctx.fillText(fd(r.pe),bx+bw+3,mY);
        
        const as=pd(r.as||r.ps),ae=pd(r.ae||r.pe);
        if(as && ae){
            const ax=dx(as),aex=dx(ae),aw=Math.max(aex-ax,3);
            const aH=isMob?8:10, aY=pY+pH+2;
            ctx.fillStyle='#FFD700';
            ctx.beginPath();if(ctx.roundRect)ctx.roundRect(ax,aY,aw,aH,3);else ctx.rect(ax,aY,aw,aH);ctx.fill();
            const pct=+r.pct||0;
            if(pct>0){
                const rx=ax+(pct/100)*aw, mAY=aY+aH/2;
                ctx.strokeStyle='#000';ctx.lineWidth=isMob?2:3;ctx.lineCap='round';
                ctx.beginPath();ctx.moveTo(ax,mAY);ctx.lineTo(rx,mAY);ctx.stroke();
                ctx.lineCap='butt';ctx.lineWidth=1;
                ctx.fillStyle='#000';ctx.font='bold '+(isMob?'8px ':'10px ')+FN;ctx.textAlign='right';
                ctx.fillText(pct+'%',ax-3,aY+(isMob?7:8));
            }
        }
    }
    y += RH;
  });

  // Today line on top
  {const tc=today<ps?ps:today>pe?pe:today,tx=dx(tc);
  ctx.strokeStyle='#c00';ctx.lineWidth=2;ctx.setLineDash([5,3]);
  ctx.beginPath();ctx.moveTo(tx,HH);ctx.lineTo(tx,H-LH);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#c00';ctx.font='bold '+(isMob?'9px ':'11px ')+FN;ctx.textAlign='center';ctx.fillText('TODAY',tx,HH+(isMob?10:13));}

  // Legend
  ctx.fillStyle='#f4f6f8';ctx.fillRect(0,H-LH,W,LH);
  ctx.strokeStyle='#ddd';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,H-LH);ctx.lineTo(W,H-LH);ctx.stroke();
  const ly=H-LH+(isMob?7:9);
  ctx.fillStyle='#1560a8';ctx.fillRect(LW+8,ly-5,22,9);
  ctx.fillStyle='#333';ctx.font=(isMob?'9px ':'11px ')+FN;ctx.textAlign='left';ctx.fillText('Plan',LW+34,ly+(isMob?3:2));
  ctx.fillStyle='#FFD700';ctx.fillRect(LW+(isMob?60:74),ly-5,22,9);ctx.strokeStyle='#aaa';ctx.lineWidth=.5;ctx.strokeRect(LW+(isMob?60:74),ly-5,22,9);
  ctx.fillStyle='#333';ctx.fillText('Actual',LW+(isMob?86:100),ly+(isMob?3:2));
  ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(LW+(isMob?62:76),ly);ctx.lineTo(LW+(isMob?80:94),ly);ctx.stroke();
  ctx.lineWidth=1;ctx.fillStyle='#333';ctx.fillText('(black=Act%)',LW+(isMob?124:148),ly+(isMob?3:2));
}

// ── S-CURVE (NOW POWERED BY SNAPSHOT ENGINE) ──
function buildC(rows, snapData){
  const {start:ps, days:td} = getRange(rows);
  const tw = rows.reduce((s,r)=>s+(+r.wt||0),0);
  const pl = new Array(td).fill(0);
  const ac = new Array(td).fill(0);
  const today = new Date();
  const todD = Math.min(td-1, Math.max(0, dd(ps, today)));

  // 1. Build Plan Curve (pl)
  if(tw>0){
    rows.forEach(r=>{
      const w=(+r.wt||0)/tw; if(!w)return;
      const s=pd(r.ps), e=pd(r.pe); if(!s||!e)return;
      const sd=Math.max(0,dd(ps,s)), ed=Math.min(td-1,dd(ps,e));
      const sp=ed-sd+1; if(sp<=0)return;
      for(let d=sd;d<=ed;d++) pl[d] += w/sp;
    });
    for(let d=1;d<td;d++) pl[d] += pl[d-1];
  }

  // 2. Build Actual Curve (ac) from Snapshot Memory
  const snaps = JSON.parse(JSON.stringify(snapData || {})); 
  const tStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  snaps[tStr] = tw > 0 ? calcP(rows) : 0; // Always inject today's exact progress

  const snapDates = Object.keys(snaps).sort((a,b) => new Date(a) - new Date(b));

  if (snapDates.length > 0) {
    let snapPts = snapDates.map(ds => {
       return { day: dd(ps, new Date(ds)), val: snaps[ds] / 100 };
    }).sort((a,b)=>a.day - b.day);

    // Remove duplicates to prevent math errors during interpolation
    snapPts = snapPts.filter((v,i,a)=> i===0 || v.day !== a[i-1].day);

    if (snapPts.length > 0) {
        let ptIdx = 0;
        for(let d=0; d<=todD; d++){
            if (d < 0) continue; 
            
            if (d <= snapPts[0].day) {
                // Draw line from day 0 to the first recorded snapshot
                if (snapPts[0].day <= 0) ac[d] = snapPts[0].val;
                else ac[d] = (d / snapPts[0].day) * snapPts[0].val;
            } else if (ptIdx < snapPts.length - 1 && d > snapPts[ptIdx+1].day) {
                // Move to next snapshot interval
                ptIdx++;
                d--; 
            } else if (ptIdx < snapPts.length - 1) {
                // Interpolate perfectly between two past snapshots
                const p1 = snapPts[ptIdx], p2 = snapPts[ptIdx+1];
                const ratio = (d - p1.day) / (p2.day - p1.day);
                ac[d] = p1.val + ratio * (p2.val - p1.val);
            } else {
                // Flatten out after the last known snapshot (which is today)
                ac[d] = snapPts[snapPts.length-1].val;
            }
        }
    }
  }
  return {pl, ac, td, ps};
}

function drawSC(cvId,rows,snapData,pc,ac_color){
  const cv=$(cvId);if(!cv)return;
  const W=cv.parentElement.getBoundingClientRect().width||cv.parentElement.offsetWidth||400;
  const H=parseInt(cv.getAttribute('height'))||200;
  if(W<10)return;
  cv.width=Math.round(W);cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  const PL=40,PR=12,PT=26,PB=28;
  const pw=W-PL-PR,ph=H-PT-PB;
  const px1=PL,py1=PT,px2=PL+pw,py2=PT+ph;
  const{pl,ac:act,td,ps}=buildC(rows, snapData); // Use the new snapshot engine
  const{start:pst,end:pen}=getRange(rows);
  const today=new Date();
  const todD=Math.min(td-1,Math.max(0,dd(pst,today)));

  // Title top-left
  const title=cvId==='cSC'?(plan==='material'?'Material S-Curve':'Installation S-Curve'):cvId==='cMat'?'Material S-Curve':'Installation S-Curve';
  ctx.fillStyle='#333';ctx.font='bold 11px '+FN;ctx.textAlign='left';ctx.fillText(title,px1,py1-4);
  
  // As-of date top-right
  ctx.fillStyle='#666';ctx.font='10px '+FN;ctx.textAlign='right';
  ctx.fillText('As of: '+today.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'}),W-6,16);

  // Legend
  const legY = py1 + 18; 
  ctx.fillStyle=pc;ctx.fillRect(px1+3,legY-4,14,4);
  ctx.fillStyle='#555';ctx.font='10px '+FN;ctx.textAlign='left';ctx.fillText('Plan',px1+20,legY);
  ctx.strokeStyle=ac_color;ctx.lineWidth=2;ctx.setLineDash([5,3]);
  ctx.beginPath();ctx.moveTo(px1+52,legY-2);ctx.lineTo(px1+66,legY-2);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#555';ctx.fillText('Actual',px1+69,legY);

  // Y grid
  [0,20,40,60,80,100].forEach(p=>{
    const gy=py2-(p/100)*ph;
    ctx.strokeStyle=p%100===0?'#bbb':'#eee';ctx.lineWidth=p%100===0?1:.5;
    ctx.setLineDash(p%100===0?[]:[3,3]);
    ctx.beginPath();ctx.moveTo(px1,gy);ctx.lineTo(px2,gy);ctx.stroke();
    ctx.fillStyle='#888';ctx.font='10px '+FN;ctx.textAlign='right';ctx.fillText(p+'%',px1-3,gy+3.5);
  });
  ctx.setLineDash([]);

  // X months
  const mths=[];let mc=new Date(pst.getFullYear(),pst.getMonth(),1);
  while(mc<=pen){mths.push(new Date(mc));mc=new Date(mc.getFullYear(),mc.getMonth()+1,1);}
  mths.forEach(m=>{
    const gx=px1+(dd(pst,m)/td)*pw;
    ctx.strokeStyle='#eee';ctx.lineWidth=.5;ctx.setLineDash([2,3]);
    ctx.beginPath();ctx.moveTo(gx,py1);ctx.lineTo(gx,py2);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#888';ctx.font='10px '+FN;ctx.textAlign='center';
    ctx.fillText(m.toLocaleString('default',{month:'short'}),gx,py2+14);
  });

  // Axes
  ctx.strokeStyle='#888';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px1,py1);ctx.lineTo(px1,py2);ctx.lineTo(px2,py2);ctx.stroke();

  // Build points
  const step=Math.max(1,Math.floor(td/300));
  const pp=[],ap=[];
  for(let d=0;d<td;d+=step){
    pp.push([px1+(d/td)*pw,py2-pl[d]*ph]);
    if(d<=todD)ap.push([px1+(d/td)*pw,py2-act[d]*ph]);
  }

  // Area fill
  if(pp.length){
    ctx.beginPath();ctx.moveTo(pp[0][0],py2);pp.forEach(([x,y])=>ctx.lineTo(x,y));
    ctx.lineTo(pp[pp.length-1][0],py2);ctx.closePath();
    ctx.fillStyle=pc+'22';ctx.fill();
  }

  // Lines
  const dl=(pts,col,dash)=>{if(!pts.length)return;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.setLineDash(dash||[]);ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);pts.forEach(([x,y])=>ctx.lineTo(x,y));ctx.stroke();ctx.setLineDash([]);};
  dl(pp,pc);dl(ap,ac_color,[6,3]);

  // % at end of lines
  if(pp.length){const[x,y]=pp[pp.length-1];const pct=Math.round(pl[Math.min(td-1,(pp.length-1)*step)]*100);ctx.fillStyle=pc;ctx.font='bold 10px '+FN;ctx.textAlign='left';ctx.fillText(pct+'%',x+3,y+4);}
  if(ap.length){const[x,y]=ap[ap.length-1];const pct=Math.round(act[todD]*100);ctx.fillStyle=ac_color;ctx.font='bold 10px '+FN;ctx.textAlign='left';ctx.fillText(pct+'%',x+3,y+4);}

  // Today vertical line
  if(today>=pst&&today<=pen){
    const tx=px1+(dd(pst,today)/td)*pw;
    ctx.strokeStyle='#c00';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(tx,py1);ctx.lineTo(tx,py2);ctx.stroke();ctx.setLineDash([]);
  }
}

function renderSC(){if(!plan)return;drawSC('cSC',D[plan].rows,D[plan].snap,plan==='material'?'#1560a8':'#d97706','#2a8a2a');}
function calcP(rows){const tw=rows.reduce((s,r)=>s+(+r.wt||0),0);if(!tw)return 0;return Math.round(rows.reduce((s,r)=>s+(+r.wt||0)*(+r.pct||0)/100,0)/tw*100);}
function renderHome(){
  drawSC('cMat',D.material.rows,D.material.snap,'#1560a8','#2a8a2a');
  drawSC('cInst',D.installation.rows,D.installation.snap,'#d97706','#2a8a2a');
  const mp=calcP(D.material.rows),ip=calcP(D.installation.rows);
  const se=(id,v)=>{const e=$(id);if(e)e.textContent=v;};
  const sw=(id,v)=>{const e=$(id);if(e)e.style.width=v+'%';};
  se('hmp',mp+'%');se('hip',ip+'%');sw('hmb',mp);sw('hib',ip);
}
function renderAll(){
  initD();
  const lp=sessionStorage.getItem('lastPlan');
  if(lp){
    requestAnimationFrame(()=>requestAnimationFrame(()=>goPlan(lp)));
  } else {
    requestAnimationFrame(()=>requestAnimationFrame(renderHome));
  }
}
let _rt;
window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(()=>{renderGantt();renderSC();renderHome();},120);});
window.addEventListener('orientationchange',()=>setTimeout(()=>{renderGantt();renderSC();},300));
</script>
