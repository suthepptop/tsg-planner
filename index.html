*{box-sizing:border-box;margin:0;padding:0;font-family:Sarabun,sans-serif}
body{background:#fff;color:#222}
#bar{position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:8px;padding:0 12px;min-height:44px;background:#1560a8;border-bottom:2px solid #0f4a8a;flex-wrap:wrap}
#bar h1{font-size:13px;font-weight:700;color:#fff;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#bar .r{display:flex;align-items:center;gap:6px}
#uinfo{font-size:11px;color:rgba(255,255,255,.85)}
.tnav{display:flex;gap:4px;flex-wrap:wrap}
.tnb{padding:3px 9px;border-radius:4px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;font-size:11px;cursor:pointer;font-family:Sarabun,sans-serif;white-space:nowrap}
.tnb:hover{background:rgba(255,255,255,.3)}
.tnb.on{background:rgba(255,255,255,.9);color:#1560a8;font-weight:700}
.btn{padding:5px 13px;border-radius:4px;border:1px solid #aaa;background:#fff;color:#222;font-size:12px;font-family:Sarabun,sans-serif;cursor:pointer}
.btn:hover{background:#f0f0f0}
.btnp{background:#1560a8;border-color:#1560a8;color:#fff}
.btnp:hover{background:#0f4a8a}
.btnd{border-color:#c00;color:#c00}
.btnsm{padding:3px 9px;font-size:11px}
.pg{display:none}
.pg.on{display:block}
#hpg.on{display:flex;height:calc(100vh - 44px);overflow:hidden}
/* HOME */
.hsb{width:190px;min-width:190px;background:#f4f6f8;border-right:1px solid #ddd;display:flex;flex-direction:column;padding:14px 12px;gap:10px;overflow-y:auto}
.hslb{font-size:10px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.pb{width:100%;padding:10px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;font-family:Sarabun,sans-serif}
.pb:hover{border-color:#1560a8;background:#eef4ff}
.pbic{width:30px;height:30px;border-radius:4px;flex-shrink:0}
.pbm{background:#e8f0fb;border:1.5px solid #1560a8}
.pbi{background:#fef3e2;border:1.5px solid #d97706}
.pbt{font-size:12px;font-weight:700;color:#222;margin-bottom:1px}
.pbs{font-size:9px;color:#888}
.hpg-r{flex:1;display:flex;flex-direction:column;padding:14px;gap:12px;background:#f9f9f9;overflow-y:auto;align-items:center}
.hcb{width:65%;min-width:300px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:10px}
.hcb canvas{display:block;width:100%}
.prbox{margin-top:4px;border-top:1px solid #ddd;padding-top:10px;display:flex;flex-direction:column;gap:3px}
.prlb{font-size:10px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.prrow{display:flex;justify-content:space-between}
.prn{font-size:11px;color:#555}
.prm{font-size:11px;font-weight:700;color:#1560a8}
.pri{font-size:11px;font-weight:700;color:#d97706}
.prbg{height:5px;background:#e0e0e0;border-radius:3px;margin-top:2px}
.prfm{height:5px;background:#1560a8;border-radius:3px;transition:width .4s}
.prfi{height:5px;background:#d97706;border-radius:3px;transition:width .4s}
/* PLAN PAGE */
.ptb{position:sticky;top:44px;z-index:100;display:flex;align-items:center;gap:7px;padding:6px 13px;background:#f0f2f5;border-bottom:1px solid #ddd;flex-wrap:wrap}
.ptit{font-size:14px;font-weight:700;color:#1560a8}
.sp{flex:1}
.rwc{display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
.rwc input{width:50px;padding:3px 5px;border:1px solid #ccc;border-radius:3px;font-size:12px;text-align:center;font-family:Sarabun,sans-serif}
/* S-CURVE */
.scs{display:flex;justify-content:center;padding:13px 0 9px;background:#fff;border-bottom:1px solid #ddd}
.scb{width:50%;min-width:360px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:8px}
.scb canvas{display:block;width:100%}
/* GANTT */
.gs{background:#fff;border-bottom:1px solid #ddd;overflow-x:auto}
.gs canvas{display:block}
/* TABLE */
.ts{background:#fff}
.tw{overflow-x:auto}
table{border-collapse:collapse;font-size:13px;width:100%}
thead th{padding:5px 7px;background:#e8edf2;border:1px solid #bbb;font-size:12px;font-weight:700;color:#333;white-space:nowrap;position:sticky;top:0;z-index:5;text-align:left}
tbody tr:nth-child(even){background:#f7f9fb}
tbody tr:hover{background:#eef4ff}
td{border:1px solid #ddd;padding:3px 5px;height:31px;vertical-align:middle}
.ci{width:100%;border:none;background:transparent;font-size:13px;font-family:Sarabun,sans-serif;color:#222;padding:2px 3px}
.ci:focus{outline:2px solid #1560a8;outline-offset:-1px;background:#fff}
.ci[readonly]{color:#888;cursor:default}
.ci.r{text-align:right}
body.ed .ci:not([readonly]){background:#fffef0;cursor:text;pointer-events:all}
body:not(.ed) .ci{pointer-events:none}
.wtb{padding:5px 13px;background:#f4f6f8;border-top:1px solid #ddd;font-size:12px;color:#555;display:flex;gap:18px}
.ok{color:#2a8a2a;font-weight:700}.wn{color:#c00;font-weight:700}
/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.mo.on{display:flex}
.md{background:#fff;border-radius:8px;padding:22px 26px;min-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.md h2{font-size:14px;margin-bottom:7px}
.md p{font-size:12px;color:#666;margin-bottom:14px;line-height:1.6}
.md label{font-size:11px;color:#666;display:block;margin-bottom:3px}
.md input{width:100%;padding:6px 9px;border:1px solid #ccc;border-radius:4px;font-size:12px;margin-bottom:10px;font-family:Sarabun,sans-serif}
.ma{display:flex;gap:7px;justify-content:flex-end;margin-top:7px}
#toast{position:fixed;bottom:18px;right:18px;background:#fff;border:1px solid #ccc;border-radius:5px;padding:7px 14px;font-size:12px;color:#222;box-shadow:0 2px 10px rgba(0,0,0,.12);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
#toast.on{opacity:1}
@media(max-width:768px){
  #hpg.on{flex-direction:column!important;height:auto!important;overflow-y:auto}
  .hsb{width:100%!important;border-right:none;border-bottom:1px solid #ddd}
  .pb{width:100%!important}

  .scb{width:95%;min-width:unset}
  table{min-width:580px}
  #bar h1{font-size:10px}
}
@media(max-width:480px){
  #bar h1{display:none}
  #uinfo{display:none}
}

  if(!s)return null;s=s.trim();
  const m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
  if(m){const d=new Date(+m[3],+m[2]-1,+m[1]);return isNaN(d.getTime())?null:d;}
  return null;
};
const toI=s=>{if(!s)return'';const m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);return m?`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`:'';};
const frI=s=>{if(!s)return'';const[y,mo,d]=s.split('-');return`${d}/${mo}/${y}`;};
const nd=s=>{
  if(!s)return'';s=s.trim();
  if(/^\d{1,2}[\/-]\d{1,2}[\/-]\d{4}$/.test(s)){const sp=s.includes('/')?'/':'-';const[d,m,y]=s.split(sp);return`${d.padStart(2,'0')}/${m.padStart(2,'0')}/${y}`;}
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;}
  if(/^\d{5}$/.test(s)){const dt=new Date((+s-25569)*86400000);return`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;}
  return s;
};
const nn=v=>{v=String(v).trim().replace('%','');let n=parseFloat(v)||0;if(n>0&&n<1)n*=100;return Math.round(n*100)/100;};
const dd=(a,b)=>Math.round((b-a)/86400000);
const fd=s=>{const d=pd(s);return d?`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`:'';}; 
const toast=(msg,err=false)=>{const e=$('toast');e.textContent=msg;e.style.borderColor=err?'#c00':'#ccc';e.classList.add('on');setTimeout(()=>e.classList.remove('on'),2800);};

function getRange(rows){
  let mn=null,mx=null;
  rows.forEach(r=>{const s=pd(r.ps),e=pd(r.pe);if(s&&(!mn||s<mn))mn=s;if(e&&(!mx||e>mx))mx=e;});
  if(!mn)mn=new Date('2026-02-16');if(!mx)mx=new Date('2026-07-15');
  return{start:mn,end:mx,days:dd(mn,mx)+1};
}

// ── DATA ──
async function loadData(){
  try{
    const r=await fetch(API+'?t='+Date.now());
    if(!r.ok){initD();renderAll();return;}
    const j=await r.json();sha=j.sha;
    const raw=atob(j.content.replace(/\n/g,''));
    // Decode UTF-8 safely
    const bytes=Uint8Array.from(raw,c=>c.charCodeAt(0));
    const txt=new TextDecoder('utf-8').decode(bytes);
    const d=JSON.parse(txt);
    if(d.material)D.material=d.material;
    if(d.installation)D.installation=d.installation;
    toast('✓ Data loaded');
  }catch(e){initD();}
  renderAll();
}
function initD(){
  const mk=n=>Array.from({length:n},(_,i)=>({no:i+1,itemNo:'',desc:'',ps:'',pe:'',wt:0,as:'',ae:'',pct:0}));
  if(!D.material.rows.length)D.material.rows=mk(16);
  if(!D.installation.rows.length)D.installation.rows=mk(16);
}
async function saveData(){
  let pat=sessionStorage.getItem('ghPAT');
  if(!pat){$('patMo').classList.add('on');return;}
  // Encode UTF-8 properly
  const json=JSON.stringify(D,null,2);
  const bytes=new TextEncoder().encode(json);
  let bin='';bytes.forEach(b=>bin+=String.fromCharCode(b));
  const content=btoa(bin);
  const body={message:`Update ${plan} data`,content};if(sha)body.sha=sha;
  try{
    const r=await fetch(API,{method:'PUT',headers:{Authorization:`token ${pat}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){const e=await r.json();toast('✗ '+e.message,true);return;}
    const j=await r.json();sha=j.content.sha;toast('✓ Saved');
  }catch(e){toast('✗ Error',true);}
}
function confirmPAT(){const v=$('patIn').value.trim();if(!v)return;sessionStorage.setItem('ghPAT',v);$('patMo').classList.remove('on');saveData();}

function applyRows(){

  while(rows.length<n)rows.push({no:rows.length+1,itemNo:'',desc:'',ps:'',pe:'',wt:0,as:'',ae:'',pct:0});
  if(rows.length>n)rows.splice(n);
  renderTable();renderGantt();renderSC();
}
function resetRows(){

}

// ── TABLE ──
function renderTable(){
  if(!plan)return;
  const rows=D[plan].rows,ro=!isEd;
  const tb=$('tb');tb.innerHTML='';
  rows.forEach((r,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><input class="ci r" value="${r.no}" ${ro?'readonly':''} onchange="up(${i},'no',+this.value)" style="width:30px"></td>
      <td><input class="ci" value="${r.itemNo||''}" ${ro?'readonly':''} onchange="up(${i},'itemNo',this.value)" style="width:66px"></td>
      <td><input class="ci" value="${r.desc||''}" ${ro?'readonly':''} onchange="up(${i},'desc',this.value)" style="width:216px"></td>
      <td><input class="ci" type="date" value="${toI(r.ps)}" ${ro?'readonly':''} onchange="upd(${i},'ps',frI(this.value))" style="width:86px"></td>
      <td><input class="ci" type="date" value="${toI(r.pe)}" ${ro?'readonly':''} onchange="upd(${i},'pe',frI(this.value))" style="width:86px"></td>
      <td><input class="ci r" value="${r.wt||0}" ${ro?'readonly':''} onchange="up(${i},'wt',nn(this.value))" style="width:38px"></td>
      <td><input class="ci" type="date" value="${toI(r.as||r.ps)}" ${ro?'readonly':''} onchange="up(${i},'as',frI(this.value))" style="width:86px"></td>
      <td><input class="ci" type="date" value="${toI(r.ae||r.pe)}" ${ro?'readonly':''} onchange="up(${i},'ae',frI(this.value))" style="width:86px"></td>
      <td><input class="ci r" value="${r.pct||0}" ${ro?'readonly':''} onchange="up(${i},'pct',nn(this.value))" style="width:38px"></td>`;
    tb.appendChild(tr);
  });
  updWt();
}
function up(i,k,v){D[plan].rows[i][k]=v;updWt();renderGantt();renderSC();}
function upd(i,k,v){
  D[plan].rows[i][k]=v;
  const r=D[plan].rows[i];
  if(k==='ps'&&!r.as)r.as=v;if(k==='pe'&&!r.ae)r.ae=v;
  updWt();renderGantt();renderSC();renderTable();
}
function updWt(){
  if(!plan)return;
  const rows=D[plan].rows;
  const s=rows.reduce((a,r)=>a+(+r.wt||0),0);
  const el=$('wts');el.textContent=s.toFixed(1)+'%';el.className=Math.abs(s-100)<0.5?'ok':'wn';
  $('acn').textContent=rows.filter(r=>r.pct>0).length;
}

// ── PASTE ──
function setupPaste(){
  if(window._pf)document.removeEventListener('paste',window._pf);
  window._pf=e=>{
    if(!isEd||!plan)return;
    const tb=$('tb');if(!tb)return;
    const inputs=Array.from(tb.querySelectorAll('input'));
    const si=inputs.indexOf(document.activeElement);if(si<0)return;
    e.preventDefault();
    const txt=(e.clipboardData||window.clipboardData).getData('text');if(!txt)return;
    const pr=txt.trim().split(/\r?\n/).map(r=>r.split('\t'));
    const cols=['no','itemNo','desc','ps','pe','wt','as','ae','pct'];
    const sr=Math.floor(si/9),sc=si%9;
    const rows=D[plan].rows;
    while(rows.length<sr+pr.length)rows.push({no:rows.length+1,itemNo:'',desc:'',ps:'',pe:'',wt:0,as:'',ae:'',pct:0});
    pr.forEach((row,ri)=>{
      const ri2=sr+ri;
      row.forEach((val,ci)=>{
        const ci2=sc+ci;if(ci2>=cols.length)return;
        const k=cols[ci2];let v=val.trim();
        if('ps pe as ae'.split(' ').includes(k))v=nd(v);
        else if('wt pct no'.split(' ').includes(k))v=nn(v);
        rows[ri2][k]=v;
        if(k==='ps'&&!rows[ri2].as)rows[ri2].as=v;
        if(k==='pe'&&!rows[ri2].ae)rows[ri2].ae=v;
      });
    });
    $('rwn').value=rows.length;
    renderTable();renderGantt();renderSC();
    toast('✓ Pasted '+pr.length+' rows');
  };
  document.addEventListener('paste',window._pf);
}

// ── GANTT ──
function renderGantt(){
  const cv=$('cGantt'),sec=$('gsec');
  if(!cv||!plan)return;
  const rows=D[plan].rows;
  const{start:ps,end:pe,days:td}=getRange(rows);
  const today=new Date();
  const LW=270,HH=34,RH=38,LH=26;
  const W=Math.max(sec.getBoundingClientRect().width||sec.offsetWidth||900,600);
  const H=HH+rows.length*RH+LH;
  cv.width=W;cv.height=H;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');
  const BW=W-LW;
  const gx=d=>LW+(d/td)*BW;
  const dx=d=>gx(dd(ps,d));
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

  // Month headers
  const ms=[];let mc=new Date(ps.getFullYear(),ps.getMonth(),1);
  while(mc<=pe){ms.push(new Date(mc));mc=new Date(mc.getFullYear(),mc.getMonth()+1,1);}
  ms.forEach((m,i)=>{
    const x1=Math.max(LW,dx(m)),x2=Math.min(W,dx(new Date(m.getFullYear(),m.getMonth()+1,1)));
    ctx.fillStyle=i%2?'#1050a0':'#1560a8';ctx.fillRect(x1,0,x2-x1,HH);
    ctx.fillStyle='#fff';ctx.font='bold 13px '+FN;ctx.textAlign='center';
    ctx.fillText(m.toLocaleString('default',{month:'short'})+"'"+String(m.getFullYear()).slice(2),(x1+x2)/2,HH-10);
    if(x1>LW){ctx.strokeStyle='#e0e0e0';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(x1,HH);ctx.lineTo(x1,H-LH);ctx.stroke();}
  });
  ctx.fillStyle='#1560a8';ctx.fillRect(0,0,LW,HH);
  ctx.fillStyle='#fff';ctx.font='bold 13px '+FN;ctx.textAlign='center';ctx.fillText('Item / Description',LW/2,HH-10);
  ctx.strokeStyle='#999';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(LW,0);ctx.lineTo(LW,H);ctx.stroke();

  // Rows
  rows.forEach((r,i)=>{
    const y=HH+i*RH;
    ctx.fillStyle=i%2?'#fff':'#f7f9fb';ctx.fillRect(0,y,W,RH);
    ctx.strokeStyle='#e5e5e5';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(0,y+RH);ctx.lineTo(W,y+RH);ctx.stroke();
    const lbl=((r.itemNo?r.itemNo+' ':'')+(r.desc||'')).substring(0,42);
    ctx.fillStyle=r.desc?'#111':'#aaa';
    ctx.font=(r.desc?'13px ':'italic 12px ')+FN;
    ctx.textAlign='left';ctx.fillText(lbl||('row '+r.no),5,y+RH*0.65);
    const s=pd(r.ps),e=pd(r.pe);if(!s||!e)return;
    // Plan bar
    const bx=dx(s),ex=dx(e),bw=Math.max(ex-bx,3);
    const pH=RH*0.38,pY=y+RH*0.08;
    ctx.fillStyle='#1560a8';
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(bx,pY,bw,pH,3);else ctx.rect(bx,pY,bw,pH);ctx.fill();
    if(bw>26){ctx.fillStyle='#fff';ctx.font='bold 10px '+FN;ctx.textAlign='center';ctx.fillText(dd(s,e)+1+'d',bx+bw/2,pY+pH*0.76);}
    const mY=pY+pH/2+4;
    ctx.fillStyle='#666';ctx.font='10px '+FN;
    ctx.textAlign='right';ctx.fillText(fd(r.ps),bx-3,mY);
    ctx.textAlign='left';ctx.fillText(fd(r.pe),bx+bw+3,mY);
    // Actual bar
    const as=pd(r.as||r.ps),ae=pd(r.ae||r.pe);if(!as||!ae)return;
    const ax=dx(as),aex=dx(ae),aw=Math.max(aex-ax,3);
    const aH=RH*0.30,aY=y+RH*0.56;
    ctx.fillStyle='#FFD700';
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(ax,aY,aw,aH,3);else ctx.rect(ax,aY,aw,aH);ctx.fill();
    const pct=+r.pct||0;
    if(pct>0){
      const rx=ax+(pct/100)*aw,mAY=aY+aH/2;
      ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(ax,mAY);ctx.lineTo(rx,mAY);ctx.stroke();
      ctx.lineCap='butt';ctx.lineWidth=1;
      ctx.fillStyle='#000';ctx.font='bold 10px '+FN;ctx.textAlign='right';
      ctx.fillText(pct+'%',ax-3,aY+aH*0.75);
    }
  });

  // Today line on top
  {const tc=today<ps?ps:today>pe?pe:today,tx=dx(tc);
  ctx.strokeStyle='#c00';ctx.lineWidth=2;ctx.setLineDash([5,3]);
  ctx.beginPath();ctx.moveTo(tx,HH);ctx.lineTo(tx,H-LH);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#c00';ctx.font='bold 11px '+FN;ctx.textAlign='center';ctx.fillText('TODAY',tx,HH+13);}

  // Legend
  ctx.fillStyle='#f4f6f8';ctx.fillRect(0,H-LH,W,LH);
  ctx.strokeStyle='#ddd';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,H-LH);ctx.lineTo(W,H-LH);ctx.stroke();
  const ly=H-LH+9;
  ctx.fillStyle='#1560a8';ctx.fillRect(LW+8,ly-5,22,9);
  ctx.fillStyle='#333';ctx.font='11px '+FN;ctx.textAlign='left';ctx.fillText('Plan',LW+34,ly+2);
  ctx.fillStyle='#FFD700';ctx.fillRect(LW+74,ly-5,22,9);ctx.strokeStyle='#aaa';ctx.lineWidth=.5;ctx.strokeRect(LW+74,ly-5,22,9);
  ctx.fillStyle='#333';ctx.fillText('Actual',LW+100,ly+2);
  ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(LW+76,ly);ctx.lineTo(LW+94,ly);ctx.stroke();
  ctx.lineWidth=1;ctx.fillStyle='#333';ctx.fillText('(black=Act%)',LW+148,ly+2);
}

// ── S-CURVE ──
function buildC(rows){
  const{start:ps,days:td}=getRange(rows);
  const tw=rows.reduce((s,r)=>s+(+r.wt||0),0);
  const pl=new Array(td).fill(0),ac=new Array(td).fill(0);
  if(tw>0){
    const today=new Date();
    rows.forEach(r=>{
      const w=(+r.wt||0)/tw;if(!w)return;
      const s=pd(r.ps),e=pd(r.pe);if(!s||!e)return;
      const sd=Math.max(0,dd(ps,s)),ed=Math.min(td-1,dd(ps,e));
      const sp=ed-sd+1;if(sp<=0)return;
      for(let d=sd;d<=ed;d++)pl[d]+=w/sp;
      const pct=(+r.pct||0)/100;if(!pct)return;
      const as=pd(r.as||r.ps),ae=pd(r.ae||r.pe);if(!as||!ae)return;
      const asd=Math.max(0,dd(ps,as));
      const todD=Math.min(td-1,dd(ps,today));
      const aed=Math.min(todD,dd(ps,ae));
      const asp=aed-asd+1;if(asp<=0)return;
      for(let d=asd;d<=aed;d++)ac[d]+=w*pct/asp;
    });
    for(let d=1;d<td;d++){pl[d]+=pl[d-1];ac[d]+=ac[d-1];}
  }
  return{pl,ac,td,ps};
}

function drawSC(cvId,rows,pc,ac){
  const cv=$(cvId);if(!cv)return;
  const W=cv.parentElement.getBoundingClientRect().width||cv.parentElement.offsetWidth||400;
  const H=parseInt(cv.getAttribute('height'))||200;
  if(W<10)return;
  cv.width=Math.round(W);cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  const PL=40,PR=12,PT=26,PB=28;
  const pw=W-PL-PR,ph=H-PT-PB;
  const px1=PL,py1=PT,px2=PL+pw,py2=PT+ph;
  const{pl,ac:act,td,ps}=buildC(rows);
  const{start:pst,end:pen}=getRange(rows);
  const today=new Date();
  const todD=Math.min(td-1,dd(pst,today));

  // Title top-left
  const title=cvId==='cSC'?(plan==='material'?'Material S-Curve':'Installation S-Curve'):cvId==='cMat'?'Material S-Curve':'Installation S-Curve';
  ctx.fillStyle='#333';ctx.font='bold 11px '+FN;ctx.textAlign='left';ctx.fillText(title,px1,py1-4);
  // As-of date top-right
  ctx.fillStyle='#666';ctx.font='10px '+FN;ctx.textAlign='right';
  ctx.fillText('As of: '+today.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'}),W-6,16);

  // Y grid
  [0,20,40,60,80,100].forEach(p=>{
    const gy=py2-(p/100)*ph;
    ctx.strokeStyle=p%100===0?'#bbb':'#eee';ctx.lineWidth=p%100===0?1:.5;
    ctx.setLineDash(p%100===0?[]:[3,3]);
    ctx.beginPath();ctx.moveTo(px1,gy);ctx.lineTo(px2,gy);ctx.stroke();
    ctx.fillStyle='#888';ctx.font='10px '+FN;ctx.textAlign='right';ctx.fillText(p+'%',px1-3,gy+3.5);
  });
  ctx.setLineDash([]);

  // X months
  const mths=[];let mc=new Date(pst.getFullYear(),pst.getMonth(),1);
  while(mc<=pen){mths.push(new Date(mc));mc=new Date(mc.getFullYear(),mc.getMonth()+1,1);}
  mths.forEach(m=>{
    const gx=px1+(dd(pst,m)/td)*pw;
    ctx.strokeStyle='#eee';ctx.lineWidth=.5;ctx.setLineDash([2,3]);
    ctx.beginPath();ctx.moveTo(gx,py1);ctx.lineTo(gx,py2);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#888';ctx.font='10px '+FN;ctx.textAlign='center';
    ctx.fillText(m.toLocaleString('default',{month:'short'}),gx,py2+14);
  });

  // Axes
  ctx.strokeStyle='#888';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px1,py1);ctx.lineTo(px1,py2);ctx.lineTo(px2,py2);ctx.stroke();

  // Build points
  const step=Math.max(1,Math.floor(td/300));
  const pp=[],ap=[];
  for(let d=0;d<td;d+=step){
    pp.push([px1+(d/td)*pw,py2-pl[d]*ph]);
    if(d<=todD)ap.push([px1+(d/td)*pw,py2-act[d]*ph]);
  }

  // Area fill
  if(pp.length){
    ctx.beginPath();ctx.moveTo(pp[0][0],py2);pp.forEach(([x,y])=>ctx.lineTo(x,y));
    ctx.lineTo(pp[pp.length-1][0],py2);ctx.closePath();
    ctx.fillStyle=pc+'22';ctx.fill();
  }

  // Lines
  const dl=(pts,col,dash)=>{if(!pts.length)return;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.setLineDash(dash||[]);ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);pts.forEach(([x,y])=>ctx.lineTo(x,y));ctx.stroke();ctx.setLineDash([]);};
  dl(pp,pc);dl(ap,ac,[6,3]);

  // % at end of lines
  if(pp.length){const[x,y]=pp[pp.length-1];const pct=Math.round(pl[Math.min(td-1,(pp.length-1)*step)]*100);ctx.fillStyle=pc;ctx.font='bold 10px '+FN;ctx.textAlign='left';ctx.fillText(pct+'%',x+3,y+4);}
  if(ap.length){const[x,y]=ap[ap.length-1];const pct=Math.round(act[todD]*100);ctx.fillStyle=ac;ctx.font='bold 10px '+FN;ctx.textAlign='left';ctx.fillText(pct+'%',x+3,y+4);}

  // Today vertical line
  if(today>=pst&&today<=pen){
    const tx=px1+(dd(pst,today)/td)*pw;
    ctx.strokeStyle='#c00';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(tx,py1);ctx.lineTo(tx,py2);ctx.stroke();ctx.setLineDash([]);
  }

  // Legend
  ctx.fillStyle=pc;ctx.fillRect(px1+3,py2-13,14,4);
  ctx.fillStyle='#555';ctx.font='10px '+FN;ctx.textAlign='left';ctx.fillText('Plan',px1+20,py2-10);
  ctx.strokeStyle=ac;ctx.lineWidth=2;ctx.setLineDash([5,3]);
  ctx.beginPath();ctx.moveTo(px1+52,py2-11);ctx.lineTo(px1+66,py2-11);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#555';ctx.fillText('Actual',px1+69,py2-10);
}

function renderSC(){if(!plan)return;drawSC('cSC',D[plan].rows,plan==='material'?'#1560a8':'#d97706','#2a8a2a');}
function calcP(rows){const tw=rows.reduce((s,r)=>s+(+r.wt||0),0);if(!tw)return 0;return Math.round(rows.reduce((s,r)=>s+(+r.wt||0)*(+r.pct||0)/100,0)/tw*100);}
function renderHome(){
  drawSC('cMat',D.material.rows,'#1560a8','#2a8a2a');
  drawSC('cInst',D.installation.rows,'#d97706','#2a8a2a');
  const mp=calcP(D.material.rows),ip=calcP(D.installation.rows);
  const se=(id,v)=>{const e=$(id);if(e)e.textContent=v;};
  const sw=(id,v)=>{const e=$(id);if(e)e.style.width=v+'%';};
  se('hmp',mp+'%');se('hip',ip+'%');sw('hmb',mp);sw('hib',ip);
}
function renderAll(){
  initD();
  const lp=sessionStorage.getItem('lastPlan');
  if(lp){
    requestAnimationFrame(()=>requestAnimationFrame(()=>goPlan(lp)));
  } else {
    requestAnimationFrame(()=>requestAnimationFrame(renderHome));
  }
}
let _rt;
window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(()=>{renderGantt();renderSC();renderHome();},120);});
window.addEventListener('orientationchange',()=>setTimeout(()=>{renderGantt();renderSC();},300));
</script>
