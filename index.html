<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache">
<title>TSG Project Planner</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>
/* ROOT LOCK TO PREVENT HORIZONTAL SCROLL IN LINE BROWSER */
* {box-sizing:border-box;margin:0;padding:0;font-family:Sarabun,sans-serif}
html, body {
  width: 100%; 
  max-width: 100%; 
  overflow-x: hidden; 
  position: relative; 
  background:#fff;
  color:#222;
  overscroll-behavior-x: none;
}

#bar {position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:8px;padding:0 12px;min-height:44px;background:#1560a8;border-bottom:2px solid #0f4a8a;flex-wrap:wrap; width: 100%;}
#bar h1 {font-size:13px;font-weight:700;color:#fff;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#bar .r {display:flex;align-items:center;gap:6px}
#uinfo {font-size:11px;color:rgba(255,255,255,.85)}

.tnav {display:flex;gap:4px;flex-wrap:wrap}
.tnb {padding:3px 9px;border-radius:4px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;font-size:11px;cursor:pointer;font-family:Sarabun,sans-serif;white-space:nowrap}
.tnb:hover {background:rgba(255,255,255,.3)}
.tnb.on {background:rgba(255,255,255,.9);color:#1560a8;font-weight:700}

.btn {padding:5px 13px;border-radius:4px;border:1px solid #aaa;background:#fff;color:#222;font-size:12px;font-family:Sarabun,sans-serif;cursor:pointer}
.btn:hover {background:#f0f0f0}
.btnp {background:#1560a8;border-color:#1560a8;color:#fff}
.btnp:hover {background:#0f4a8a}
.btnd {border-color:#c00;color:#c00}
.btnsm {padding:3px 9px;font-size:11px}

.pg {display:none; width: 100%; max-width: 100%;}
.pg.on {display:block}
#hpg.on {display:flex;height:calc(100vh - 44px);overflow:hidden; width: 100%;}

/* HOME */
.hsb {width:190px;min-width:190px;background:#f4f6f8;border-right:1px solid #ddd;display:flex;flex-direction:column;padding:14px 12px;gap:10px;overflow-y:auto}
.hslb {font-size:10px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.pb {width:100%;padding:10px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;font-family:Sarabun,sans-serif}
.pb:hover {border-color:#1560a8;background:#eef4ff}
.pbic {width:30px;height:30px;border-radius:4px;flex-shrink:0}
.pbm {background:#e8f0fb;border:1.5px solid #1560a8}
.pbi {background:#fef3e2;border:1.5px solid #d97706}
.pbt {font-size:12px;font-weight:700;color:#222;margin-bottom:1px}
.pbs {font-size:9px;color:#888}

.hpg-r {flex:1;display:flex;flex-direction:column;padding:14px;gap:12px;background:#f9f9f9;overflow-y:auto;align-items:center; max-width: 100%;}
.hcb {width:65%;min-width:300px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:10px; max-width: 100%;}
.hcb canvas {display:block;width:100%}

.prbox {margin-top:4px;border-top:1px solid #ddd;padding-top:10px;display:flex;flex-direction:column;gap:3px}
.prlb {font-size:10px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.prrow {display:flex;justify-content:space-between}
.prn {font-size:11px;color:#555}
.prm {font-size:11px;font-weight:700;color:#1560a8}
.pri {font-size:11px;font-weight:700;color:#d97706}
.prbg {height:5px;background:#e0e0e0;border-radius:3px;margin-top:2px}
.prfm {height:5px;background:#1560a8;border-radius:3px;transition:width .4s}
.prfi {height:5px;background:#d97706;border-radius:3px;transition:width .4s}

/* PLAN PAGE */
.ptb {position:sticky;top:44px;z-index:100;display:flex;align-items:center;gap:7px;padding:6px 13px;background:#f0f2f5;border-bottom:1px solid #ddd;flex-wrap:wrap; width: 100%;}
.ptit {font-size:14px;font-weight:700;color:#1560a8}
.sp {flex:1}
.rwc {display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
.rwc input {width:50px;padding:3px 5px;border:1px solid #ccc;border-radius:3px;font-size:12px;text-align:center;font-family:Sarabun,sans-serif}

/* S-CURVE */
.scs {display:flex;justify-content:center;padding:13px 0 9px;background:#fff;border-bottom:1px solid #ddd; width: 100%;}
.scb {width:50%;min-width:360px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:8px; max-width: 100%;}
.scb canvas {display:block;width:100%}

/* GANTT */
.gs {background:#fff;border-bottom:1px solid #ddd;overflow-x:hidden; width: 100%; max-width: 100%;}
.gs canvas {display:block; max-width: 100%;}

/* TABLE */
.ts {background:#fff; width: 100%; max-width: 100%;}
.tw {overflow-x:auto; width: 100%; max-width: 100%;}

table {
  border-collapse: collapse;
  font-size: 13px;
  width: 100%;
  min-width: 1000px;
  table-layout: fixed;
}

thead th {
  padding: 8px 10px;
  background: #e8edf2;
  border: 1px solid #bbb;
  font-size: 12px;
  font-weight: 700;
  color: #333;
  position: sticky;
  top: 0;
  z-index: 5;
  text-align: left;
}

.col-no    { width: 45px;  text-align: center; }
.col-item  { width: 100px; }
.col-desc  { width: auto;  } 
.col-date  { width: 135px; } 
.col-pct   { width: 60px;  text-align: center; }

tbody tr:nth-child(even) {background:#f7f9fb}
tbody tr:hover {background:#eef4ff}

td {
  border: 1px solid #ddd;
  padding: 2px 4px;
  height: 34px;
  vertical-align: middle;
}

.ci {
  width: 100%;
  height: 28px;
  border: none;
  background: transparent;
  font-size: 13px;
  font-family: Sarabun, sans-serif;
  color: #222;
  padding: 2px 6px;
  border-radius: 2px;
}

.ci:focus {outline:2px solid #1560a8;outline-offset:-1px;background:#fff}
.ci[readonly] {color:#888;cursor:default}
.ci.r {text-align:right}

body.ed .ci:not([readonly]) {
  background:#fffef0;
  cursor:text;
  pointer-events:all;
  border: 1px solid #e0e0e0;
}
body:not(.ed) .ci {pointer-events:none}

.wtb {padding:5px 13px;background:#f4f6f8;border-top:1px solid #ddd;font-size:12px;color:#555;display:flex;gap:18px; width: 100%;}
.ok {color:#2a8a2a;font-weight:700}
.wn {color:#c00;font-weight:700}

/* PRINT MODE FOR 100% WIDTH A4 CONTINUOUS PDF EXPORT */
.print-mode {
  width: 1000px !important;
  max-width: 1000px !important;
  min-width: 1000px !important;
  margin: 0 !important;
  padding: 20px !important; 
  background: #fff !important;
  height: auto !important;
  overflow: visible !important;
  position: absolute !important; 
  top: 0 !important;
  left: 0 !important;
  z-index: 9999 !important;
}
.print-mode .scs { padding: 0 0 20px 0 !important; border-bottom: none !important; display: block; }
.print-mode .scb { width: 100% !important; min-width: 100% !important; border: none !important; padding: 0 !important; box-shadow: none !important; }
.print-mode .gs { overflow: visible !important; width: 100% !important; min-width: 100% !important; border-bottom: none !important; margin-bottom: 20px !important; }
.print-mode .ts { overflow: visible !important; width: 100% !important; min-width: 100% !important; }
.print-mode .tw { overflow: visible !important; width: 100% !important; min-width: 100% !important; }
.print-mode table { width: 100% !important; min-width: 100% !important; table-layout: fixed !important; border-collapse: collapse !important; }
.print-mode .col-no    { width: 4% !important; text-align: center; }
.print-mode .col-item  { width: 8% !important; }
.print-mode .col-desc  { width: 34% !important; }
.print-mode .col-date  { width: 11% !important; text-align: center; }
.print-mode .col-pct   { width: 5% !important; text-align: center; }
.print-mode th { font-size: 11px !important; padding: 6px 4px !important; white-space: normal; background: #e8edf2 !important; }
.print-mode td { padding: 4px !important; border: 1px solid #ddd !important; }
.print-mode .ci { font-size: 11px !important; padding: 0 !important; background: transparent !important; border: none !important; color: #000 !important; width: 100% !important; height: auto !important; min-width: 0 !important; }
.print-mode .wtb { display: none !important; } 

/* MODAL */
.mo {display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.mo.on {display:flex}
.md {background:#fff;border-radius:8px;padding:22px 26px;min-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.md h2 {font-size:14px;margin-bottom:7px}
.md p {font-size:12px;color:#666;margin-bottom:14px;line-height:1.6}
.md label {font-size:11px;color:#666;display:block;margin-bottom:3px}
.md input {width:100%;padding:6px 9px;border:1px solid #ccc;border-radius:4px;font-size:12px;margin-bottom:10px;font-family:Sarabun,sans-serif}
.ma {display:flex;gap:7px;justify-content:flex-end;margin-top:7px}

#toast {position:fixed;bottom:18px;right:18px;background:#fff;border:1px solid #ccc;border-radius:5px;padding:7px 14px;font-size:12px;color:#222;box-shadow:0 2px 10px rgba(0,0,0,.12);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
#toast.on {opacity:1}

/* MOBILE BROWSER OPTIMIZATIONS (Max Width 768px) */
@media(max-width:768px){
  #hpg.on {flex-direction:column!important;height:auto!important;overflow-y:auto; width: 100%;}
  .hsb {width:100%!important;border-right:none;border-bottom:1px solid #ddd}
  .pb {width:100%!important}
  .hpg-r {padding:10px; width: 100%; max-width: 100%; overflow-x: hidden;}
  .hcb {width:100%; max-width: 100%; min-width:unset; padding: 5px;}
  
  .scs {padding: 10px 5px; width: 100%; max-width: 100%;}
  .scb {width:100%; max-width: 100%; min-width:unset; padding: 5px;}
  #bar h1 {font-size:10px}
  
  /* STRICT 100% WIDTH FOR MOBILE CONTAINERS */
  .ts { width: 100%; max-width: 100%; overflow-x: hidden; }
  .tw { width: 100%; max-width: 100%; overflow-x: hidden; }
  table { min-width: 100% !important; width: 100% !important; max-width: 100% !important; table-layout: fixed; }
  
  /* Compress columns */
  .col-no { width: 6% !important; }
  .col-item { width: 12% !important; }
  .col-desc { width: 28% !important; }
  .col-date { width: 14% !important; }
  .col-pct { width: 6% !important; }
  
  th { font-size: 8px !important; padding: 4px 1px !important; word-wrap: break-word; letter-spacing: -0.2px; }
  td { padding: 1px !important; height: 26px !important; }
  .ci { font-size: 9px !important; padding: 0 !important; height: 24px !important; letter-spacing: -0.2px;}
  
  /* Hide the native date picker icons to save horizontal space */
  input[type="date"]::-webkit-inner-spin-button,
  input[type="date"]::-webkit-calendar-picker-indicator { display: none; -webkit-appearance: none; margin: 0; }
  
  .wtb { font-size: 10px; flex-wrap: wrap; }
  .rwc input { width: 35px; font-size: 10px; padding: 2px; }
  .btnsm { padding: 2px 5px; font-size: 10px; }
}

@media(max-width:480px){
  #bar h1 {display:none}
  #uinfo {display:none}
}
</style>
</head>
<body>

<div id="bar">
  <h1>TSG PROJECT PLANNER</h1>
  <div class="tnav">
    <button class="tnb" id="nbM" onclick="goPlan('material')">📦 Material</button>
    <button class="tnb" id="nbI" onclick="goPlan('installation')">🔧 Installation</button>
  </div>
  <div class="r">
    <span id="uinfo"></span>
    <div id="gBtn"></div>
    <button class="btn btnsm" id="soBtn" style="display:none;color:#fff;background:transparent;border-color:rgba(255,255,255,.5)" onclick="signOut()">Sign Out</button>
  </div>
</div>

<div class="pg" id="hpg">
  <div class="hsb">
    <div class="hslb">Select Plan</div>
    <button class="pb" onclick="goPlan('material')">
      <div class="pbic pbm"></div>
      <div><div class="pbt">Material Plan</div><div
